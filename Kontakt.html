<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kontakt - Zürich Hunters</title>

        <link rel="stylesheet" href="style.css" />

        <!-- Leaflet CSS -->
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet/dist/leaflet.css"
        />
    </head>

    <body>
        <!-- Header  -->
        <app-header></app-header>

        <app-sidebars></app-sidebars>

        <!-- MAIN CONTENT -->
        <section class="page-section contact-intro">
            <h2>Kontakt</h2>

            <p>Du möchtest mit uns in Kontakt treten?</p>
            <p>Schreib uns per Mail oder folge uns auf Social Media.</p>

            <a href="mailto:zürichhunters@gmx.ch">Sende direkt eine Email</a>

            <div class="contact-images">
                <img
                    src="Images/Instagram.jpg"
                    alt="Instagram"
                    class="contact-img"
                />
            </div>
        </section>

        <section class="page-section">
            <h2>Trainingsort</h2>
            <div id="map"></div>
        </section>

        <!-- LEAFLET JS -->
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

        <!-- MAIN SCRIPT -->
        <script src="js/components.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                /* MAP */
                if (document.getElementById("map")) {
                    const map = L.map("map").setView([47.39679, 8.60023], 13);

                    L.tileLayer(
                        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
                        {
                            attribution: "&copy; OpenStreetMap contributors",
                        },
                    ).addTo(map);

                    L.marker([47.39645, 8.60072])
                        .addTo(map)
                        .bindPopup("Zürich Hunters - Trainingshalle");
                }
            });
        </script>
    </body>
</html>
